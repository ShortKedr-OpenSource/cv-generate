<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-translate="title">Резюме - Николай Накорешко</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;500;700&display=swap');

        :root {
            --ink: #111827;
            --ink-soft: #334155;
            --muted: #64748b;
            --line: #dbe2ef;
            --panel: rgba(255, 255, 255, 0.78);
            --panel-strong: #ffffff;
            --accent: #0ea5e9;
            --accent-strong: #0b7fc9;
            --bg-a: #e0f2fe;
            --bg-b: #f0f9ff;
            --bg-c: #eef2ff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Manrope', sans-serif;
            color: var(--ink);
            line-height: 1.7;
            background:
                radial-gradient(circle at 8% 12%, var(--bg-a) 0, transparent 35%),
                radial-gradient(circle at 92% 88%, var(--bg-c) 0, transparent 40%),
                linear-gradient(160deg, var(--bg-b), #ffffff);
            padding: 32px 20px;
        }

        .shell {
            width: min(1160px, 100%);
            margin: 0 auto;
        }

        .container {
            border: 1px solid rgba(148, 163, 184, 0.25);
            border-radius: 28px;
            overflow: hidden;
            display: grid;
            grid-template-columns: 340px 1fr;
            box-shadow: 0 32px 80px rgba(15, 23, 42, 0.12);
            backdrop-filter: blur(8px);
            background: var(--panel);
        }

        .sidebar {
            padding: 34px 26px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(244, 249, 255, 0.96));
            border-right: 1px solid rgba(148, 163, 184, 0.22);
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .side-card {
            background: var(--panel-strong);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 6px 20px rgba(15, 23, 42, 0.04);
        }

        .language-switcher {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 4px;
        }

        .actions {
            display: flex;
            justify-content: flex-start;
        }

        .export-button {
            width: auto;
            min-width: 160px;
            border: 0;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            color: #ffffff;
            font-weight: 700;
            font-size: 14px;
            padding: 12px 18px;
            cursor: pointer;
            box-shadow: 0 12px 24px rgba(14, 165, 233, 0.24);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .export-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 16px 28px rgba(14, 165, 233, 0.3);
        }

        .language-switcher button {
            border: 1px solid var(--line);
            border-radius: 999px;
            background: #ffffff;
            color: var(--ink-soft);
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 0.08em;
            padding: 7px 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .language-switcher button:hover {
            border-color: var(--accent);
            color: var(--accent-strong);
        }

        .language-switcher button.active {
            color: #ffffff;
            border-color: var(--accent);
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            box-shadow: 0 8px 14px rgba(14, 165, 233, 0.28);
        }

        .sidebar h2 {
            margin: 0 0 12px;
            font-size: 13px;
            letter-spacing: 0.11em;
            text-transform: uppercase;
            font-family: 'Space Grotesk', sans-serif;
            color: var(--muted);
        }

        .sidebar p {
            margin: 0;
            color: var(--ink-soft);
        }

        .sidebar a {
            color: var(--accent-strong);
            text-decoration: none;
            border-bottom: 1px dashed transparent;
            transition: border-color 0.2s ease, color 0.2s ease;
        }

        .sidebar a:hover {
            border-color: var(--accent-strong);
        }

        .sidebar ul {
            margin: 0;
            padding: 0;
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .sidebar ul li {
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid #c8d8ec;
            background: #f8fbff;
            color: #1d4f91;
            font-size: 13px;
            font-weight: 600;
        }

        .certifications p {
            font-size: 14px;
        }

        .gdpr-compliance p {
            font-size: 11px;
            line-height: 1.55;
            color: var(--muted);
        }

        .main-content {
            padding: 40px 42px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(250, 252, 255, 0.95));
        }

        .header {
            padding: 20px 24px;
            border-radius: 22px;
            border: 1px solid rgba(148, 163, 184, 0.3);
            background:
                linear-gradient(135deg, rgba(14, 165, 233, 0.1), rgba(99, 102, 241, 0.06)),
                #ffffff;
            margin-bottom: 26px;
        }

        .header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            letter-spacing: -0.03em;
            font-size: clamp(32px, 5vw, 46px);
            line-height: 1.08;
            margin: 0;
            color: #0f172a;
        }

        .header .subtitle {
            margin: 8px 0 0;
            color: #0c4a6e;
            font-weight: 700;
            font-size: 18px;
        }

        .header .location {
            margin: 8px 0 0;
            color: var(--muted);
            font-weight: 600;
            font-size: 14px;
        }

        .section {
            margin-bottom: 24px;
            background: #ffffff;
            border-radius: 18px;
            border: 1px solid var(--line);
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.04);
            padding: 22px;
        }

        .section:last-child {
            margin-bottom: 0;
        }

        .section h2 {
            margin: 0 0 16px;
            font-size: 15px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-family: 'Space Grotesk', sans-serif;
            color: var(--muted);
        }

        #summary-content p {
            margin: 0 0 12px;
            color: #334155;
        }

        #summary-content p:last-child {
            margin-bottom: 0;
        }

        .job {
            position: relative;
            border-left: 2px solid #d7e7fa;
            margin-left: 6px;
            padding-left: 18px;
            margin-bottom: 16px;
        }

        .job:last-child {
            margin-bottom: 0;
        }

        .job::before {
            content: "";
            position: absolute;
            left: -7px;
            top: 6px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.16);
        }

        .job-company-date {
            display: flex;
            gap: 12px;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 4px;
            flex-wrap: wrap;
        }

        .job-company {
            font-weight: 700;
            font-size: 17px;
            color: #0f172a;
        }

        .job-date {
            color: var(--muted);
            font-weight: 600;
            font-size: 13px;
        }

        .job-title {
            margin: 0;
            color: #0c4a6e;
            font-weight: 700;
            font-size: 15px;
        }

        .job-description {
            margin: 8px 0 0;
            color: #475569;
        }

        .education-entry {
            border: 1px solid #dae8f8;
            border-radius: 14px;
            padding: 16px;
            background: #f8fbff;
        }

        .education-university {
            margin: 0;
            color: #0f172a;
            font-weight: 700;
            font-size: 17px;
        }

        .education-degree {
            margin: 8px 0 0;
            color: #0c4a6e;
            font-size: 15px;
            font-weight: 700;
        }

        .education-date {
            margin: 8px 0 0;
            color: var(--muted);
            font-weight: 600;
            font-size: 13px;
        }

                background: #ffffff;
                background-image: none !important;
                backdrop-filter: none !important;

            .header {

            .section {
                padding: 11px 13px;

                border-radius: 10px;
                break-inside: auto;
                page-break-inside: auto;
            }

            .section:last-child {
                margin-bottom: 0;
            }

            .section h2,
            .sidebar h2 {
                font-size: 11px;
                margin-bottom: 8px;
                letter-spacing: 0.08em;
                break-after: avoid;
                page-break-after: avoid;
            }

            .header h1 {
                font-size: 28px;
            }

            .header .subtitle {
                margin-top: 4px;
                font-size: 13px;
            }

            .header .location {
                margin-top: 4px;

            }

            .sidebar p,
            #summary-content p,
            .job-description,
            .education-date,
            .job-date {
                font-size: 11px;
                line-height: 1.33;
            }

            #summary-content p {
                margin: 0 0 7px;
                orphans: 3;
                widows: 3;
            }

            .sidebar ul {
                gap: 5px;
            }

            .sidebar ul li {
                padding: 4px 7px;
                font-size: 10px;
            }

            .job {
                margin-bottom: 9px;
                padding-left: 12px;
                margin-left: 4px;
                break-inside: avoid;
                page-break-inside: avoid;
            }

            .job::before {
                width: 8px;
                height: 8px;
                left: -5px;
                top: 5px;
                box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.12);
            }

            .job-company-date {
                margin-bottom: 2px;
                gap: 6px;
            }

            .job-company {
                font-size: 13px;
            }

            .job-title {
                font-size: 11px;
            }

            .job-description {
                margin-top: 4px;
            }

            .education-entry {
                padding: 9px 10px;
                border-radius: 8px;
                background: #ffffff;
                break-inside: avoid;
                page-break-inside: avoid;
            }

            .education-university {
                font-size: 13px;
            }

            .education-degree {
                margin-top: 4px;
                font-size: 11px;
            }

            .certifications p,
            .gdpr-compliance p {
                font-size: 10px;
            }

            .gdpr-compliance p {
                line-height: 1.3;
            }

            .summary,
            .education,
            .contact-info,
            .skills,
            .languages,
            .certifications,
            .gdpr-compliance {
                break-inside: avoid;
                page-break-inside: avoid;
            }

            .experience {
                break-inside: auto;
                page-break-inside: auto;
            }

            a {
                color: inherit;
                text-decoration: none;
            }

<body>
    <div class="shell">
        <div class="container">

        const embeddedAppConfig = {
            languages: ['ru', 'en', 'de'],
            themes: [
                {
                    id: 'default',
                    label: 'Default Sky',
                    tokens: {
                        ink: '#111827',
                        'ink-soft': '#334155',
                        muted: '#64748b',
                        line: '#dbe2ef',
                        panel: 'rgba(255, 255, 255, 0.78)',
                        'panel-strong': '#ffffff',
                        accent: '#0ea5e9',
                        'accent-strong': '#0b7fc9',
                        'bg-a': '#e0f2fe',
                        'bg-b': '#f0f9ff',
                        'bg-c': '#eef2ff'
                    }
                }
            ],
            defaults: {
                language: 'ru',
                theme: 'default'
            },
            profile: {
                id: 'nikolay-nakoreshko'
            }
        };

        let translations = {};
        let supportedLangs = embeddedAppConfig.languages.slice();
        let availableThemes = embeddedAppConfig.themes.slice();
        let defaultLanguage = embeddedAppConfig.defaults.language;
        let defaultTheme = embeddedAppConfig.defaults.theme;
        let useExternalFiles = false;

        function syncConfigState(config) {
            supportedLangs = Array.isArray(config.languages) && config.languages.length
                ? config.languages
                : embeddedAppConfig.languages.slice();
            availableThemes = Array.isArray(config.themes) && config.themes.length
                ? config.themes
                : embeddedAppConfig.themes.slice();

            const configuredDefaultLanguage = config.defaults && typeof config.defaults.language === 'string'
                ? config.defaults.language
                : embeddedAppConfig.defaults.language;
            const configuredDefaultTheme = config.defaults && typeof config.defaults.theme === 'string'
                ? config.defaults.theme
                : embeddedAppConfig.defaults.theme;

            defaultLanguage = supportedLangs.includes(configuredDefaultLanguage)
                ? configuredDefaultLanguage
                : embeddedAppConfig.defaults.language;
            defaultTheme = availableThemes.some(theme => theme.id === configuredDefaultTheme)
                ? configuredDefaultTheme
                : embeddedAppConfig.defaults.theme;
        }

        async function loadAppConfig() {
            try {
                const response = await fetch('config/app.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const config = await response.json();
                syncConfigState(config);
                useExternalFiles = true;
                console.log('✓ Application config loaded from config/app.json');
                return true;
            } catch (e) {
                console.warn('ℹ Using embedded app config fallback', e);
                syncConfigState(embeddedAppConfig);
                translations = embeddedTranslations;
                useExternalFiles = false;
                return false;
            }
        }

        // Загрузка конкретного языка из файла
        async function loadTranslationFromFile(lang) {
            if (translations[lang]) {
                return;
            }
            try {
                const response = await fetch(`locales/${lang}.json`);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                translations[lang] = await response.json();
                console.log(`✓ Загружена локализация: ${lang}`);
            } catch (e) {
                console.error(`✗ Не удалось загрузить ${lang}.json, использую встроенные данные`, e);
                // Откат на встроенные данные
                if (embeddedTranslations[lang]) {
                    translations[lang] = embeddedTranslations[lang];
                } else if (lang !== 'ru' && embeddedTranslations['ru']) {
                    translations[lang] = embeddedTranslations['ru'];
                }
            }
        }

        function resolveTheme(themeId) {
            return availableThemes.find(theme => theme.id === themeId)
                || availableThemes.find(theme => theme.id === defaultTheme)
                || embeddedAppConfig.themes[0];
        }

        function applyTheme(themeId) {
            const theme = resolveTheme(themeId);
            const tokens = theme && theme.tokens ? theme.tokens : {};
            const root = document.documentElement;

            Object.entries(tokens).forEach(([token, value]) => {
                root.style.setProperty(`--${token}`, value);
            });

            root.dataset.theme = theme.id;
        }

        function exportToPdf() {
            window.print();
        }

        function createLanguageSwitcher() {
            const switcher = document.querySelector('.language-switcher');
            switcher.innerHTML = '';
            supportedLangs.forEach(lang => {
                const button = document.createElement('button');
                button.textContent = lang.toUpperCase();
                button.onclick = () => changeLanguage(lang);
                switcher.appendChild(button);
            });
        }

        async function changeLanguage(lang) {
            if (!supportedLangs.includes(lang)) {
                lang = defaultLanguage;
            }

            if (useExternalFiles) {
                await loadTranslationFromFile(lang);
            }

            document.documentElement.lang = lang;
            updateContent(lang);
            updateLanguageSwitcher(lang);
        }

        function updateLanguageSwitcher(lang) {
            document.querySelectorAll('.language-switcher button').forEach(button => {
                if (button.innerText.toLowerCase() === lang) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function updateContent(lang) {
            const data = translations[lang];
            if (!data) {
                console.error(`No data for language: ${lang}`);
                return;
            }

            document.querySelectorAll('[data-translate]').forEach(el => {
                const key = el.getAttribute('data-translate');
                const keys = key.split('.');
                let value = data;
                try {
                    for (const k of keys) {
                        value = value[k];
                    }
                    if (value !== undefined && typeof value === 'string') {
                        el.innerHTML = value;
                    } else if (value === undefined) {
                         el.innerHTML = ''; // Clear content if key not found
                    }
                } catch (e) {
                    el.innerHTML = ''; // Clear content on error
                }
            });

            // Skills
            const skillsList = document.getElementById('skills-list');
            skillsList.innerHTML = '';
            if(data.skills) {
                data.skills.forEach(skill => {
                    const li = document.createElement('li');
                    li.textContent = skill;
                    skillsList.appendChild(li);
                });
            }

            // Languages
            const languagesList = document.getElementById('languages-list');
            languagesList.innerHTML = '';
            if(data.languages) {
                data.languages.forEach(language => {
                    const li = document.createElement('li');
                    li.textContent = language;
                    languagesList.appendChild(li);
                });
            }

            // Summary
            const summaryContent = document.getElementById('summary-content');
            summaryContent.innerHTML = '';
            if(data.summary) {
                data.summary.forEach(pText => {
                    const p = document.createElement('p');
                    p.textContent = pText;
                    summaryContent.appendChild(p);
                });
            }

            // Experience
            const experienceContent = document.getElementById('experience-content');
            experienceContent.innerHTML = '';
            if(data.experience) {
                data.experience.forEach(job => {
                    const jobDiv = document.createElement('div');
                    jobDiv.className = 'job';
                    jobDiv.innerHTML = `
                        <div class="job-company-date">
                            <span class="job-company">${job.company}</span>
                            <span class="job-date">${job.date}</span>
                        </div>
                        <h3 class="job-title">${job.title}</h3>
                        ${job.description ? `<p class="job-description">${job.description}</p>` : ''}
                    `;
                    experienceContent.appendChild(jobDiv);
                });
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await loadAppConfig();
            applyTheme(defaultTheme);
            createLanguageSwitcher();
            const userLang = navigator.language.split('-')[0];
            const lang = supportedLangs.includes(userLang) ? userLang : defaultLanguage;
            await changeLanguage(lang);
        });
    </script>
