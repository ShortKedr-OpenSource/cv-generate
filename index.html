        const embeddedAppConfig = {
            languages: ['ru', 'en', 'de'],
            themes: [
                { id: 'default', label: 'Sky', stylesheet: 'styles/themes/default.css' },
                { id: 'graphite', label: 'Graphite', stylesheet: 'styles/themes/graphite.css' },
                { id: 'sand', label: 'Sand', stylesheet: 'styles/themes/sand.css' }
            ],
            defaults: {
                language: 'ru',
                theme: 'default'
            },
            profile: {
                id: 'nikolay-nakoreshko'
            }
        };

        const THEME_STORAGE_KEY = 'cv-app-theme';
        const THEME_LOAD_ERROR_TEXT = 'Не удалось загрузить тему оформления. Проверьте файл стилей и попробуйте снова.';
        let translations = {};
        let supportedLangs = embeddedAppConfig.languages.slice();
        let availableThemes = embeddedAppConfig.themes.slice();
        let defaultLanguage = embeddedAppConfig.defaults.language;
        let defaultTheme = embeddedAppConfig.defaults.theme;
        let selectedTheme = embeddedAppConfig.defaults.theme;
        let useExternalFiles = false;

        function syncConfigState(config) {
            supportedLangs = Array.isArray(config.languages) && config.languages.length
                ? config.languages
                : embeddedAppConfig.languages.slice();
            availableThemes = Array.isArray(config.themes) && config.themes.length
                ? config.themes
                : embeddedAppConfig.themes.slice();

            const configuredDefaultLanguage = config.defaults && typeof config.defaults.language === 'string'
                ? config.defaults.language
                : embeddedAppConfig.defaults.language;
            const configuredDefaultTheme = config.defaults && typeof config.defaults.theme === 'string'
                ? config.defaults.theme
                : embeddedAppConfig.defaults.theme;

            defaultLanguage = supportedLangs.includes(configuredDefaultLanguage)
                ? configuredDefaultLanguage
                : embeddedAppConfig.defaults.language;
            defaultTheme = availableThemes.some(theme => theme.id === configuredDefaultTheme)
                ? configuredDefaultTheme
                : embeddedAppConfig.defaults.theme;
        }

        async function loadAppConfig() {
            try {
                const response = await fetch('config/app.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const config = await response.json();
                syncConfigState(config);
                useExternalFiles = true;
                console.log('✓ Application config loaded from config/app.json');
                return true;
            } catch (e) {
                console.warn('ℹ Using embedded app config fallback', e);
                syncConfigState(embeddedAppConfig);
                translations = embeddedTranslations;
                useExternalFiles = false;
                return false;
            }
        }

        async function loadTranslationFromFile(lang) {
            if (translations[lang]) {
                return;
            }
            try {
                const response = await fetch(`locales/${lang}.json`);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                translations[lang] = await response.json();
                console.log(`✓ Загружена локализация: ${lang}`);
            } catch (e) {
                console.error(`✗ Не удалось загрузить ${lang}.json, использую встроенные данные`, e);
                if (embeddedTranslations[lang]) {
                    translations[lang] = embeddedTranslations[lang];
                } else if (lang !== 'ru' && embeddedTranslations['ru']) {
                    translations[lang] = embeddedTranslations['ru'];
                }
            }
        }

        function resolveTheme(themeId) {
            return availableThemes.find(theme => theme.id === themeId)
                || availableThemes.find(theme => theme.id === defaultTheme)
                || embeddedAppConfig.themes[0];
        }

        function getStoredTheme() {
            try {
                return window.localStorage.getItem(THEME_STORAGE_KEY);
            } catch (e) {
                return null;
            }
        }

        function persistTheme(themeId) {
            try {
                window.localStorage.setItem(THEME_STORAGE_KEY, themeId);
            } catch (e) {
                console.warn('Theme preference could not be saved', e);
            }
        }

        function getThemeStylesheetLink() {
            return document.getElementById('theme-stylesheet');
        }

        function showThemeStatus(message) {
            const status = document.querySelector('.theme-status');
            if (!status) {
                return;
            }

            status.hidden = false;
            status.textContent = message;
        }

        function hideThemeStatus() {
            const status = document.querySelector('.theme-status');
            if (!status) {
                return;
            }

            status.hidden = true;
            status.textContent = '';
        }

        function createLanguageSwitcher() {
            const switcher = document.querySelector('.language-switcher');
            switcher.innerHTML = '';
            supportedLangs.forEach(lang => {
                const button = document.createElement('button');
                button.type = 'button';
                button.textContent = lang.toUpperCase();
                button.onclick = () => changeLanguage(lang);
                switcher.appendChild(button);
            });
        }

        function createThemeSwitcher() {
            const switcher = document.querySelector('.theme-switcher');
            switcher.innerHTML = '';
            availableThemes.forEach(theme => {
                const button = document.createElement('button');
                button.type = 'button';
                button.textContent = theme.label;
                button.dataset.themeId = theme.id;
                button.onclick = () => changeTheme(theme.id);
                switcher.appendChild(button);
            });
        }

        function updateLanguageSwitcher(lang) {
            document.querySelectorAll('.language-switcher button').forEach(button => {
                if (button.innerText.toLowerCase() === lang) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function updateThemeSwitcher(themeId) {
            document.querySelectorAll('.theme-switcher button').forEach(button => {
                button.classList.toggle('active', button.dataset.themeId === themeId);
            });
        }

        async function loadThemeStylesheet(theme) {
            if (!theme || !theme.stylesheet) {
                throw new Error('Theme stylesheet is not configured');
            }

            const href = theme.stylesheet;
            const link = getThemeStylesheetLink();
            if (!link) {
                throw new Error('Theme stylesheet link is missing');
            }

            const targetHref = new URL(href, window.location.href).href;
            if (link.href === targetHref) {
                return;
            }

            const response = await fetch(href, { cache: 'no-cache' });
            if (!response.ok) {
                throw new Error(`Theme CSS request failed with status ${response.status}`);
            }

            await new Promise((resolve, reject) => {
                const handleLoad = () => {
                    cleanup();
                    resolve();
                };
                const handleError = () => {
                    cleanup();
                    reject(new Error('Theme stylesheet could not be applied'));
                };
                const cleanup = () => {
                    link.removeEventListener('load', handleLoad);
                    link.removeEventListener('error', handleError);
                };

                link.addEventListener('load', handleLoad);
                link.addEventListener('error', handleError);
                link.href = href;
            });
        }

        async function applyTheme(themeId) {
            const theme = resolveTheme(themeId);

            try {
                await loadThemeStylesheet(theme);
                document.documentElement.dataset.theme = theme.id;
                selectedTheme = theme.id;
                updateThemeSwitcher(theme.id);
                hideThemeStatus();
                return true;
            } catch (error) {
                console.error(`Theme "${theme.id}" could not be loaded`, error);
                showThemeStatus(`${THEME_LOAD_ERROR_TEXT} (${theme.label})`);
                updateThemeSwitcher(selectedTheme || defaultTheme);
                return false;
            }
        }

        async function changeTheme(themeId) {
            const theme = resolveTheme(themeId);
            const didApply = await applyTheme(theme.id);
            if (didApply) {
                persistTheme(theme.id);
            }
        }

        function exportToPdf() {
            window.print();
        }

        async function changeLanguage(lang) {
            if (!supportedLangs.includes(lang)) {
                lang = defaultLanguage;
            }

            if (useExternalFiles) {
                await loadTranslationFromFile(lang);
            }

            document.documentElement.lang = lang;
            updateContent(lang);
            updateLanguageSwitcher(lang);
        }

        function updateContent(lang) {
            const data = translations[lang];
            if (!data) {
                console.error(`No data for language: ${lang}`);
                return;
            }

            document.querySelectorAll('[data-translate]').forEach(el => {
                const key = el.getAttribute('data-translate');
                const keys = key.split('.');
                let value = data;
                try {
                    for (const k of keys) {
                        value = value[k];
                    }
                    if (value !== undefined && typeof value === 'string') {
                        el.innerHTML = value;
                    } else if (value === undefined) {
                        el.innerHTML = '';
                    }
                } catch (e) {
                    el.innerHTML = '';
                }
            });

            const skillsList = document.getElementById('skills-list');
            skillsList.innerHTML = '';
            if (data.skills) {
                data.skills.forEach(skill => {
                    const li = document.createElement('li');
                    li.textContent = skill;
                    skillsList.appendChild(li);
                });
            }

            const languagesList = document.getElementById('languages-list');
            languagesList.innerHTML = '';
            if (data.languages) {
                data.languages.forEach(language => {
                    const li = document.createElement('li');
                    li.textContent = language;
                    languagesList.appendChild(li);
                });
            }

            const summaryContent = document.getElementById('summary-content');
            summaryContent.innerHTML = '';
            if (data.summary) {
                data.summary.forEach(pText => {
                    const p = document.createElement('p');
                    p.textContent = pText;
                    summaryContent.appendChild(p);
                });
            }

            const experienceContent = document.getElementById('experience-content');
            experienceContent.innerHTML = '';
            if (data.experience) {
                data.experience.forEach(job => {
                    const jobDiv = document.createElement('div');
                    jobDiv.className = 'job';
                    jobDiv.innerHTML = `
                        <div class="job-company-date">
                            <span class="job-company">${job.company}</span>
                            <span class="job-date">${job.date}</span>
                        </div>
                        <h3 class="job-title">${job.title}</h3>
                        ${job.description ? `<p class="job-description">${job.description}</p>` : ''}
                    `;
                    experienceContent.appendChild(jobDiv);
                });
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await loadAppConfig();
            createLanguageSwitcher();
            createThemeSwitcher();

            const storedTheme = getStoredTheme();
            const initialTheme = availableThemes.some(theme => theme.id === storedTheme) ? storedTheme : defaultTheme;
            await applyTheme(initialTheme);

            const userLang = navigator.language.split('-')[0];
            const lang = supportedLangs.includes(userLang) ? userLang : defaultLanguage;
            await changeLanguage(lang);
        });
    </script>

</body>
